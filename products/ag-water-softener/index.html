<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="refresh" content="0; url=https://agsoftener.com/">
    <title>Redirecting to AG Water Softener</title>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
      const target = new URL("https://agsoftener.com/");
      const params = new URLSearchParams(window.location.search);
      const band = params.get("band");
      if (band === "hard" || band === "veryhard") {
        target.searchParams.set("band", band);
      }
      window.location.replace(target.toString());
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://agsoftener.com/">AG Water Softener</a>.</p>
  </body>
</html>
